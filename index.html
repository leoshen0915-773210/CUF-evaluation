<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUF 計算效率預測儀表板 (v2.0 校正版)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --panel-bg: #ffffff;
            --text-color: #333333;
            --border-radius: 8px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-weight: 600;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .panel {
            background-color: var(--panel-bg);
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e4e8;
        }
        .panel-title {
            font-size: 1.25rem;
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #4a5568;
        }
        .val-display {
            float: right;
            color: var(--accent-color);
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        /* 結果顯示區塊特別樣式 */
        .result-box {
            background-color: #ebf8ff;
            border-left: 5px solid var(--accent-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .result-label {
            font-size: 0.9rem;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .result-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2b6cb0;
            margin: 5px 0 0 0;
            word-break: break-all;
        }
        .result-sub {
            font-size: 1rem;
            color: #2d3748;
            margin-top: 5px;
        }
        .note {
            font-size: 0.85rem;
            color: #718096;
            margin-top: 20px;
            font-style: italic;
        }
        
        /* 響應式設計：手機或窄螢幕改為上下排列 */
        @media (max-width: 800px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CUF 計算效率預測儀表板 <span style="font-size: 0.5em; color: #e74c3c;">v2.0 校正版</span></h1>
    
    <div class="dashboard">
        <div class="panel">
            <h2 class="panel-title">⚙️ 模擬參數設定</h2>
            
            <div class="form-group">
                <label>硬體設定：CPU 類型</label>
                <select id="cpuType">
                    <option value="AMD 7302">AMD 7302 (基準)</option>
                    <option value="AMD 9475F">AMD 9475F (高時脈)</option>
                </select>
            </div>

            <div class="form-group">
                <label>硬體設定：平行核心數 <span id="val-cores" class="val-display">64</span></label>
                <input type="range" id="cores" min="16" max="128" step="16" value="64">
            </div>

            <div class="form-group">
                <label>網格模型：總元素數量 (個)</label>
                <input type="number" id="elements" min="100000" max="10000000" step="100000" value="2336552">
            </div>

            <div class="form-group">
                <label>物理模型選擇</label>
                <select id="physicsModel">
                    <option value="Hybrid EBG">Hybrid EBG</option>
                    <option value="Detail">Detail</option>
                </select>
            </div>

            <div class="form-group">
                <label>製程幾何：狹縫高度 (um) <span id="val-gap" class="val-display">20</span></label>
                <input type="range" id="gapHeight" min="5" max="100" step="1" value="20">
            </div>

            <div class="form-group">
                <label>材料屬性：黏度 (Poise) <span id="val-visc" class="val-display">0.22</span></label>
                <input type="range" id="viscosity" min="0.05" max="3.0" step="0.01" value="0.22">
            </div>

            <div class="form-group">
                <label>製程時間：總物理時間 (秒)</label>
                <input type="number" id="physTime" min="1" max="5000" step="1" value="99">
            </div>
        </div>

        <div class="panel" style="background-color: #f0f4f8;">
            <h2 class="panel-title">📊 預估運算成本</h2>
            
            <div class="result-box">
                <div class="result-label">預估時間步階 (dt)</div>
                <div class="result-value" id="out-dt">計算中...</div>
                <div class="result-sub">秒 / Step</div>
            </div>

            <div class="result-box">
                <div class="result-label">求解器總迭代次數</div>
                <div class="result-value" id="out-steps" style="color: #c53030;">計算中...</div>
                <div class="result-sub">Steps</div>
            </div>

            <div class="result-box" style="border-left-color: #38a169; background-color: #f0fff4;">
                <div class="result-label">預估總計算時間</div>
                <div class="result-value" id="out-time" style="color: #276749;">計算中...</div>
                <div class="result-sub" id="out-time-sec">... 秒</div>
            </div>

            <p class="note">
                * 本預測基於您的歷史極端數據 (233萬網格 / 0.22P 黏度 / 64核) 進行經驗縮放校正。<br>
                * 計算邏輯：考慮了低黏度對 Courant 數的壓縮效應，以及阿姆達爾定律 (Amdahl's law) 在多核心平行運算上的折減。
            </p>
        </div>
    </div>
</div>

<script>
    // 取得所有輸入元件
    const inputs = {
        cpuType: document.getElementById('cpuType'),
        cores: document.getElementById('cores'),
        elements: document.getElementById('elements'),
        physicsModel: document.getElementById('physicsModel'),
        gapHeight: document.getElementById('gapHeight'),
        viscosity: document.getElementById('viscosity'),
        physTime: document.getElementById('physTime')
    };

    // 取得所有顯示元件
    const displays = {
        cores: document.getElementById('val-cores'),
        gap: document.getElementById('val-gap'),
        visc: document.getElementById('val-visc'),
        outDt: document.getElementById('out-dt'),
        outSteps: document.getElementById('out-steps'),
        outTime: document.getElementById('out-time'),
        outTimeSec: document.getElementById('out-time-sec')
    };

    // 數字千分位格式化函數
    function formatNumber(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    // 核心計算邏輯 (v2.0 校正版)
    function calculate() {
        // 讀取當前值
        const cpuType = inputs.cpuType.value;
        const cores = parseInt(inputs.cores.value);
        const elements = parseInt(inputs.elements.value);
        const physicsModel = inputs.physicsModel.value;
        const gapHeight = parseFloat(inputs.gapHeight.value);
        const viscosity = parseFloat(inputs.viscosity.value);
        const physTime = parseFloat(inputs.physTime.value);

        // 更新滑桿文字顯示
        displays.cores.innerText = cores;
        displays.gap.innerText = gapHeight;
        displays.visc.innerText = viscosity.toFixed(2);

        // 1. 計算 dt (預估時間步階)
        // 校正係數：0.00003 確保在 gap=20, visc=0.22 時，dt 接近 2.73E-04
        let base_dt = 0.00003 * gapHeight * Math.sqrt(viscosity);
        let dt = (physicsModel === 'Detail') ? base_dt * 0.25 : base_dt;

        // 2. 計算總迭代次數
        let total_steps = Math.round(physTime / dt);

        // 3. 計算 CPU 效能常數
        let cpu_factor = (cpuType === 'AMD 9475F') ? 0.85 : 1.0;

        // 4. 計算平行加速比 (阿姆達爾定律近似)
        let speedup = Math.pow(cores, 0.85);

        // 5. 計算總耗時 (秒)
        // 基礎負載基準：每 100 萬網格
        // 校正負載常數：26.6 (為了對齊 233萬網格跑 36萬步需 64萬秒的真實數據)
        let base_effort = elements / 1000000.0;
        let comp_time_sec = (total_steps * base_effort * 26.6 * cpu_factor) / speedup;

        // 6. 格式化輸出資料
        displays.outDt.innerText = dt.toExponential(2).toUpperCase();
        displays.outSteps.innerText = formatNumber(total_steps);
        
        // 時間轉換 (天、小時)
        let hours = (comp_time_sec / 3600).toFixed(1);
        let days = (comp_time_sec / 86400).toFixed(2);
        
        displays.outTime.innerText = `${hours} 小時 (${days} 天)`;
        displays.outTimeSec.innerText = `總計 ${formatNumber(Math.round(comp_time_sec))} 秒`;
    }

    // 綁定事件監聽器，只要有變動就重新計算
    Object.values(inputs).forEach(input => {
        input.addEventListener('input', calculate);
        input.addEventListener('change', calculate);
    });

    // 初始化第一次計算
    calculate();
</script>

</body>
</html>
